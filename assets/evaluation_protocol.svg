<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">Leakage-aware evaluation protocol</title>
  <desc id="desc">Conceptual comparison of random pair and geometry-aware splitting with validation-only hyperparameter selection and final held-out evaluation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fffaf3"/><stop offset="1" stop-color="#f3f9ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#31516a" flood-opacity=".16"/></filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M 0 0 L 12 6 L 0 12 z" fill="#54728b"/></marker>
    <style>.h{font-family:Arial,Helvetica,sans-serif;font-size:31px;font-weight:700;fill:#17324a}.s{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#587086}.k{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;letter-spacing:1.1px;fill:#277a95}.t{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#17324a}.b{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#405a6f}.small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#6d8494}.white{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;fill:white}</style>
  </defs>
  <rect width="1440" height="720" fill="url(#bg)"/>
  <text x="70" y="70" class="h">Validation protocol and leakage controls</text>
  <text x="70" y="101" class="s">Both regimes preserve a fixed untouched test partition. Their generalization claims are different and must be reported separately.</text>
  <line x1="70" y1="130" x2="1370" y2="130" stroke="#d7e4ed"/>

  <g filter="url(#shadow)">
    <rect x="70" y="175" width="570" height="395" rx="20" fill="#ffffff" stroke="#bfd6e4"/>
    <rect x="70" y="175" width="570" height="58" rx="20" fill="#eaf7fb"/><rect x="70" y="213" width="570" height="20" fill="#eaf7fb"/>
    <text x="98" y="211" class="k">BASELINE REGIME</text><text x="98" y="266" class="t">Random pair split</text>
    <text x="98" y="296" class="b">Rows are randomly assigned to train, validation, and test.</text>
    <rect x="98" y="334" width="160" height="64" rx="12" fill="#3c9ac1"/><text x="151" y="372" class="white">Train pairs</text>
    <rect x="285" y="334" width="130" height="64" rx="12" fill="#77b9d0"/><text x="312" y="372" class="white">Validation</text>
    <rect x="442" y="334" width="130" height="64" rx="12" fill="#345a88"/><text x="486" y="372" class="white">Test</text>
    <text x="98" y="442" class="b">Useful as a conventional reference point.</text>
    <text x="98" y="469" class="b">Limitation: a geometry can occur in both train and test pairs.</text>
    <rect x="98" y="497" width="514" height="47" rx="10" fill="#fff5e8"/><text x="116" y="527" class="small">Interpret test MAE as pair-level interpolation performance, potentially optimistic for new geometries.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="175" width="570" height="395" rx="20" fill="#ffffff" stroke="#bfd6e4"/>
    <rect x="800" y="175" width="570" height="58" rx="20" fill="#edf8ef"/><rect x="800" y="213" width="570" height="20" fill="#edf8ef"/>
    <text x="828" y="211" class="k" fill="#287354">STRICTER REGIME</text><text x="828" y="266" class="t">Geometry-aware split</text>
    <text x="828" y="296" class="b">Unique geometry IDs are partitioned before retaining pair rows.</text>
    <rect x="828" y="334" width="130" height="64" rx="12" fill="#38936c"/><text x="863" y="372" class="white">Train IDs</text>
    <rect x="985" y="334" width="130" height="64" rx="12" fill="#70b899"/><text x="1007" y="372" class="white">Validation IDs</text>
    <rect x="1142" y="334" width="130" height="64" rx="12" fill="#456a99"/><text x="1180" y="372" class="white">Test IDs</text>
    <text x="828" y="442" class="b">A pair is retained only when both geometries are in one partition.</text>
    <text x="828" y="469" class="b">Cross-partition pairs are dropped to prevent geometry leakage.</text>
    <rect x="828" y="497" width="514" height="47" rx="10" fill="#eef7f1"/><text x="846" y="527" class="small">Interpret test MAE as a stricter estimate for held-out molecular geometries.</text>
  </g>

  <path d="M355 590 V622 H706" fill="none" stroke="#54728b" stroke-width="3" marker-end="url(#arrow)"/><path d="M1085 590 V622 H736" fill="none" stroke="#54728b" stroke-width="3" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="524" y="605" width="392" height="78" rx="18" fill="#1c3851"/>
    <text x="555" y="638" class="white">Shared experimental discipline</text>
    <text x="555" y="662" style="font-family:Arial,Helvetica,sans-serif;font-size:13px;fill:#d4e8f2">Tune α and γ on train/validation only → freeze settings → evaluate test once.</text>
  </g>
</svg>
