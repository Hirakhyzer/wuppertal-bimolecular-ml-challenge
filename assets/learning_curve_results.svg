<line x1="95" y1="263.0" x2="960" y2="263.0" stroke="#d9e2ec" stroke-width="1"/><text x="83" y="268.0" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#627d98">5</text>
