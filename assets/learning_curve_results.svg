<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" role="img" aria-labelledby="title desc">
<title id="title">Double-logarithmic learning curve for bi-molecular Kernel Ridge Regression</title>
<desc id="desc">Held-out test MAE declines from 15.504 at 100 training pairs to 0.135 at 8000 training pairs.</desc>
